name: Docker build & publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read package.json version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub creds
        id: dh
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DH_USER" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.dh.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          DH_ENABLED: ${{ steps.dh.outputs.enabled }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -e
          REF="${GITHUB_REF##*/}"
          DH="mscrnt/kb-bundler"
          GH="ghcr.io/${{ github.repository_owner }}/kb-bundler"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            CLEAN="${REF#v}"
            GH_TAGS="${GH}:${CLEAN},${GH}:latest"
            DH_TAGS="${DH}:${CLEAN},${DH}:latest"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            GH_TAGS="${GH}:${PKG_VERSION},${GH}:latest"
            DH_TAGS="${DH}:${PKG_VERSION},${DH}:latest"
          else
            GH_TAGS="${GH}:${REF}"
            DH_TAGS=""
          fi
          if [ "$DH_ENABLED" = "true" ] && [ -n "$DH_TAGS" ]; then
            OUT="${GH_TAGS},${DH_TAGS}"
          else
            OUT="${GH_TAGS}"
          fi
          echo "tags=${OUT}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
